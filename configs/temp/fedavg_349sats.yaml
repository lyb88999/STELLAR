aggregation:
  max_staleness: 300.0
  min_updates: 1
  timeout: 600.0
  weighted_average: true
client:
  batch_size: 32
  compute_capacity: 1.0
  learning_rate: 0.01
  local_epochs: 5
  momentum: 0.9
  storage_capacity: 1000.0
data:
  alpha: 0.5
  csv_path: data/STIN.csv
  dataset: real_traffic
  iid: true
  overlap_ratio: 0.5
  region_similarity: false
  test_size: 0.2
energy:
  config_file: configs/energy_config.yaml
execution:
  log_level: INFO
  max_workers: 8
  random_seed: 42
fedavg:
  min_satellite_per_orbit: 3
  participation_rate: 1.0
  selection_method: random
fl:
  num_orbits: 12
  num_rounds: 20
  num_satellites: 651
  round_interval: 300
  satellites_per_orbit: 40
ground_station:
  aggregation_interval: 60.0
  bandwidth_limit: 5000.0
  batch_size: 50
  priority_levels: 3
  storage_limit: 50000.0
model:
  batch_size: 32
  hidden_dim: 64
  learning_rate: 0.01
  momentum: 0.9
  type: traffic_classifier
network:
  max_distance: 5000.0
  tle_file: configs/oneweb_TLEs.txt
propagation:
  energy_per_hop: 0.05
  hops: 2
  inter_orbit_links: true
  intra_orbit_links: true
  link_reliability: 0.95
  max_satellites: 651
  propagation_delay: 10
  relay_selection: nearest
