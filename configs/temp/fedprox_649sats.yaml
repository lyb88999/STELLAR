aggregation:
  max_staleness: 2
  min_updates: 1
  timeout: 600.0
  weighted_average: true
client:
  batch_size: 32
  learning_rate: 0.01
  local_epochs: 5
  momentum: 0.9
  shuffle: true
  weight_decay: 0.0001
data:
  alpha: 0.5
  csv_path: data/STIN.csv
  dataset: real_traffic
  iid: true
  overlap_ratio: 0.5
  region_similarity: false
  test_size: 0.2
energy:
  config_file: configs/energy_config.yaml
fedprox:
  mu: 0.1
fl:
  num_orbits: 12
  num_rounds: 20
  num_satellites: 651
  round_interval: 300
  satellites_per_orbit: 40
model:
  hidden_dim: 64
network:
  max_distance: 5000.0
  tle_file: configs/oneweb_TLEs.txt
propagation:
  energy_per_hop: 0.05
  hops: 2
  inter_orbit_links: true
  intra_orbit_links: true
  link_reliability: 0.95
  max_satellites: 649
