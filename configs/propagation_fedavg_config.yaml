# Propagation-constrained FedAvg configuration
# Models propagate only within a limited number of hops (ISL-aware aggregation)

# Network configuration
network:
  tle_file: "configs/oneweb_TLEs.txt"
  max_distance: 5000.0  # Maximum ISL distance (km), increased for OneWeb

# Energy model configuration
energy:
  config_file: "configs/energy_config.yaml"

# Federated learning configuration
fl:
  num_satellites: 651        # OneWeb constellation
  satellites_per_orbit: 40   # Satellites per orbital plane
  num_orbits: 12             # Number of orbital planes
  num_rounds: 20             # Number of FL communication rounds
  round_interval: 300        # Simulated seconds between rounds

# FedAvg-specific configuration
fedavg:
  participation_rate: 1.0
  min_satellite_per_orbit: 3
  selection_method: "random"

# Propagation configuration
propagation:
  hops: 2                    # Maximum propagation hops
  max_satellites: 648        # Maximum number of satellites in propagation range (OneWeb scale)
  relay_selection: "nearest" # Relay selection strategy: nearest | random | energy_aware
  intra_orbit_links: true    # Allow intra-orbit ISLs
  inter_orbit_links: true    # Allow inter-orbit ISLs
  link_reliability: 0.95     # ISL reliability probability
  propagation_delay: 10      # Per-hop propagation delay (ms)
  energy_per_hop: 0.05       # Energy cost per hop (Wh)

# Data configuration
# Set csv_path to your local traffic dataset CSV file
data:
  dataset: "real_traffic"
  csv_path: "data/STIN.csv"   # <-- update this path
  test_size: 0.2
  iid: true
  alpha: 0.5
  region_similarity: false
  overlap_ratio: 0.5

# Model configuration
model:
  type: "traffic_classifier"
  hidden_dim: 64
  batch_size: 32
  learning_rate: 0.01
  momentum: 0.9

# Client configuration
client:
  batch_size: 32
  local_epochs: 5
  learning_rate: 0.01
  momentum: 0.9
  compute_capacity: 1.0
  storage_capacity: 1000.0

# Aggregation configuration
aggregation:
  min_updates: 1             # Reduced for large-scale OneWeb constellation
  max_staleness: 300.0
  timeout: 600.0
  weighted_average: true

# Ground station configuration
ground_station:
  bandwidth_limit: 5000.0    # Mbps, increased for OneWeb scale
  storage_limit: 50000.0     # MB, increased for OneWeb scale
  priority_levels: 3
  batch_size: 50
  aggregation_interval: 60.0

# Execution configuration
execution:
  max_workers: 8
  random_seed: 42
  log_level: "INFO"
