# STELLAR: Similarity-based grouping FL configuration

# Network configuration
network:
  tle_file: "configs/oneweb_TLEs.txt"
  max_distance: 5000.0  # Maximum ISL distance (km), increased for OneWeb

# Energy model configuration
energy:
  config_file: "configs/energy_config.yaml"

# Federated learning configuration
fl:
  num_satellites: 651        # OneWeb constellation
  satellites_per_orbit: 40   # Satellites per orbital plane
  num_orbits: 12             # Number of orbital planes
  num_rounds: 20             # Number of FL communication rounds
  round_interval: 300        # Simulated seconds between rounds

# Data configuration
# Set csv_path to your local traffic dataset CSV file
data:
  dataset: "real_traffic"
  csv_path: "data/STIN.csv"   # <-- update this path
  test_size: 0.2             # Fraction of data for testing
  iid: true                  # true = IID split; false = non-IID (Dirichlet)
  alpha: 0.5                 # Dirichlet alpha (used only when iid: false)
  region_similarity: false
  overlap_ratio: 0.5

# Model configuration
model:
  type: "traffic_classifier"
  hidden_dim: 64
  batch_size: 32
  learning_rate: 0.01
  momentum: 0.9

# Client configuration
client:
  batch_size: 32
  local_epochs: 5
  learning_rate: 0.01
  momentum: 0.9
  compute_capacity: 1.0
  storage_capacity: 1000.0

# Aggregation configuration
aggregation:
  min_updates: 1             # Reduced for large-scale OneWeb constellation
  max_staleness: 300.0
  timeout: 600.0
  weighted_average: true

# Ground station configuration
ground_station:
  bandwidth_limit: 5000.0    # Mbps, increased for OneWeb scale
  storage_limit: 50000.0     # MB, increased for OneWeb scale
  priority_levels: 3
  batch_size: 50
  aggregation_interval: 60.0

# STELLAR similarity-based grouping configuration
group:
  max_distance: 2              # Search radius (hops) for neighbors
  max_group_size: 5            # Maximum satellites per similarity group
  similarity_threshold: 0.5   # Minimum composite similarity score to form a group
  max_group_size_threshold: 4  # Trigger threshold adjustment when group exceeds this size
  similarity_refresh_rounds: 5 # Re-compute grouping every N rounds
  initial_group_size: 1        # Each satellite forms its own group initially
  weights:
    alpha: 0.4                 # Weight for parameter similarity
    beta: 0.3                  # Weight for loss similarity
    gamma: 0.3                 # Weight for prediction distribution similarity

early_stopping:
  enabled: false
  min_rounds: 20
  max_rounds_without_improvement: 100
  accuracy_threshold: 100.0
