# FedAvg baseline configuration

# Network configuration
network:
  tle_file: "configs/oneweb_TLEs.txt"
  max_distance: 5000.0  # Maximum ISL distance (km), increased for OneWeb

# Energy model configuration
energy:
  config_file: "configs/energy_config.yaml"

# Federated learning configuration
fl:
  num_satellites: 651        # OneWeb constellation
  satellites_per_orbit: 40   # Satellites per orbital plane
  num_orbits: 12             # Number of orbital planes
  num_rounds: 20             # Number of FL communication rounds
  round_interval: 300        # Simulated seconds between rounds

# FedAvg-specific configuration
fedavg:
  participation_rate: 0.8    # Fraction of satellites participating per round

# Data configuration
# Set csv_path to your local traffic dataset CSV file
data:
  dataset: "real_traffic"
  csv_path: "data/STIN.csv"   # <-- update this path
  test_size: 0.2             # Fraction of data for testing
  iid: true                  # true = IID split; false = non-IID (Dirichlet)
  alpha: 0.6                 # Dirichlet alpha (used only when iid: false)

# Model configuration
model:
  type: "traffic_classifier"
  hidden_dim: 64
  batch_size: 32
  learning_rate: 0.001
  momentum: 0.9

# Client configuration
client:
  batch_size: 32
  local_epochs: 5
  learning_rate: 0.01
  momentum: 0.9
  compute_capacity: 1.0
  storage_capacity: 1000.0

# Aggregation configuration
aggregation:
  min_updates: 1             # Reduced for large-scale OneWeb constellation
  max_staleness: 300.0
  timeout: 600.0
  weighted_average: true
