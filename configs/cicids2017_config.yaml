# 网络配置
network:
  tle_file: "configs/oneweb_TLEs.txt"
  max_distance: 5000.0  # km

# 能源配置
energy:
  config_file: "configs/energy_config.yaml"
  
# 联邦学习配置
fl:
  num_satellites: 600  # Adjusted for OneWeb scale simulation
  satellites_per_orbit: 50
  num_orbits: 12
  num_rounds: 50
  round_interval: 300
  
# 数据配置
data:
  dataset: "cicids2017"
  csv_path: "data/MachineLearningCVE"   # <-- path to CICIDS-2017 directory containing 8 CSV files
  test_size: 0.2
  iid: false
  alpha: 0.5
  region_similarity: false
  overlap_ratio: 0.5

# 模型配置
model:
  type: "traffic_classifier"
  hidden_dim: 64 # Revert to 64 for simple MLP
  batch_size: 64
  learning_rate: 0.005
  momentum: 0.9
  
# 客户端配置
client:
  batch_size: 64
  local_epochs: 5
  learning_rate: 0.005
  momentum: 0.9
  compute_capacity: 1.0
  storage_capacity: 1000.0
  
# 聚合配置
aggregation:
  min_updates: 1
  max_staleness: 300.0
  timeout: 600.0
  weighted_average: true

# 分组配置 (STELLAR特有)
group:
  max_distance: 2
  max_group_size: 5
  similarity_threshold: 0.6
  max_group_size_threshold: 4
  similarity_refresh_rounds: 5
  weights:
    alpha: 0.4 # Parameter similarity
    beta: 0.3  # Loss similarity
    gamma: 0.3 # Prediction similarity

# 鲁棒性配置
robustness:
  parameter_noise_level: 0.0
  noise_start_round: 5

# 传播配置 (LimitedPropagation FedAvg/FedProx特有)
propagation:
  hops: 2
  max_satellites: 648
  intra_orbit_links: true
  inter_orbit_links: true
  link_reliability: 0.95
  energy_per_hop: 0.05
