# Propagation-constrained FedProx configuration

# Federated learning configuration
fl:
  num_rounds: 20
  round_interval: 300
  num_satellites: 651        # OneWeb constellation
  num_orbits: 12
  satellites_per_orbit: 40

# Data configuration
# Set csv_path to your local traffic dataset CSV file
data:
  dataset: "real_traffic"
  csv_path: "data/STIN.csv"   # <-- update this path
  test_size: 0.2
  iid: true
  alpha: 0.5
  region_similarity: false
  overlap_ratio: 0.5

# Client configuration
client:
  local_epochs: 5
  batch_size: 32
  learning_rate: 0.01
  momentum: 0.9
  shuffle: true
  optimizer: sgd
  weight_decay: 0.0001

# Aggregation configuration
aggregation:
  min_updates: 1             # Reduced for large-scale OneWeb constellation
  max_staleness: 2
  timeout: 600.0
  weighted_average: true

# Model configuration
model:
  hidden_dim: 64

# Network configuration
network:
  tle_file: "configs/oneweb_TLEs.txt"
  max_distance: 5000.0  # km, increased for OneWeb connectivity

# Energy model configuration
energy:
  config_file: "configs/energy_config.yaml"

# FedProx-specific parameter
fedprox:
  mu: 0.1                    # Proximal term coefficient

# Propagation configuration
propagation:
  hops: 2                    # Maximum propagation hops
  max_satellites: 24         # Maximum satellites in propagation range
  intra_orbit_links: true    # Allow intra-orbit ISLs
  inter_orbit_links: true    # Allow inter-orbit ISLs
  link_reliability: 0.95     # ISL reliability probability
  energy_per_hop: 0.05       # Energy cost per hop (Wh)
